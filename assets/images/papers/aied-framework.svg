<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-label="LLM integration framework for secondary computing education">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#fdf4ef"/>
    </linearGradient>
  </defs>
  <rect width="640" height="420" rx="16" fill="url(#bg)"/>
  <text x="320" y="36" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#1c1b19">Figure 1. Framework for LLM integration in secondary computing classrooms</text>
  <g font-family="system-ui, sans-serif" font-size="13" font-weight="600">
    <rect x="40" y="70" width="160" height="56" rx="10" fill="#2d6a9f" fill-opacity="0.15" stroke="#2d6a9f" stroke-width="2"/>
    <text x="120" y="103" text-anchor="middle" fill="#1c3d5c">Prepare</text>
    <rect x="240" y="70" width="160" height="56" rx="10" fill="#1a7a62" fill-opacity="0.15" stroke="#1a7a62" stroke-width="2"/>
    <text x="320" y="103" text-anchor="middle" fill="#0f4d3c">Adapt Curriculum</text>
    <rect x="440" y="70" width="160" height="56" rx="10" fill="#7c4dff" fill-opacity="0.15" stroke="#7c4dff" stroke-width="2"/>
    <text x="520" y="103" text-anchor="middle" fill="#4a2f99">Lead</text>
    <path d="M200 98 H240" stroke="#8a8278" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M400 98 H440" stroke="#8a8278" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="140" y="170" width="160" height="56" rx="10" fill="#d97706" fill-opacity="0.15" stroke="#d97706" stroke-width="2"/>
    <text x="220" y="203" text-anchor="middle" fill="#8a4d00">Assess</text>
    <rect x="340" y="170" width="160" height="56" rx="10" fill="#c4456a" fill-opacity="0.15" stroke="#c4456a" stroke-width="2"/>
    <text x="420" y="203" text-anchor="middle" fill="#7a2540">Synthesize</text>
    <path d="M520 126 V150 H420 V170" fill="none" stroke="#8a8278" stroke-width="2"/>
    <path d="M120 126 V150 H220 V170" fill="none" stroke="#8a8278" stroke-width="2"/>
    <rect x="240" y="270" width="160" height="56" rx="10" fill="#cc5500" fill-opacity="0.15" stroke="#cc5500" stroke-width="2"/>
    <text x="320" y="303" text-anchor="middle" fill="#7a3300">Share</text>
    <path d="M220 226 V248 H320 V270" fill="none" stroke="#8a8278" stroke-width="2"/>
    <path d="M420 226 V248 H320" fill="none" stroke="#8a8278" stroke-width="2"/>
  </g>
  <text x="320" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#5c5852">27 implementation steps across six empirically grounded phases (n = 11 teachers)</text>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#8a8278"/>
    </marker>
  </defs>
</svg>
